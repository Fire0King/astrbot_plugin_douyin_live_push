<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #1a1a2e;
    padding: 12px;
}
.card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    width: 380px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
}
.avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #fe2c55;
    flex-shrink: 0;
}
.header-info { flex: 1; min-width: 0; }
.nickname {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a2e;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.tag {
    font-size: 11px;
    color: #fe2c55;
    font-weight: 500;
}
.cover {
    width: 100%;
    display: block;
    background: #f0f0f0;
    max-height: 480px;
    object-fit: contain;
}
.body {
    padding: 12px 16px 14px;
}
.title {
    font-size: 14px;
    color: #333;
    line-height: 1.4;
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
.stats {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
}
.stat-item {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 12px;
    color: #888;
}
.stat-item .num { font-weight: 500; color: #555; }
.url {
    font-size: 11px;
    color: #aaa;
    margin-top: 8px;
    word-break: break-all;
}
</style>
</head>
<body>
<div class="card">
    <div class="header">
        <img class="avatar" src="{{ avatar }}" alt="avatar" onerror="this.style.display='none'">
        <div class="header-info">
            <div class="nickname">{{ nickname }}</div>
            <div class="tag">📹 新视频</div>
        </div>
    </div>
    <img class="cover" src="{{ cover }}" alt="cover" onerror="this.style.display='none'">
    <div class="body">
        <div class="title">{{ title }}</div>
        <div class="stats">
            <span class="stat-item">❤️ <span class="num">{{ digg_count }}</span></span>
            <span class="stat-item">💬 <span class="num">{{ comment_count }}</span></span>
            <span class="stat-item">⭐ <span class="num">{{ collect_count }}</span></span>
            <span class="stat-item">🔗 <span class="num">{{ share_count }}</span></span>
        </div>
        <div class="url">{{ url }}</div>
    </div>
</div>
</body>
</html>
