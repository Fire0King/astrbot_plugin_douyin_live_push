<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    padding: 20px;
}
.card {
    background: rgba(255,255,255,0.95);
    border-radius: 16px;
    padding: 24px;
    max-width: 420px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid #eee;
}
.avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #fe2c55;
}
.header-info { flex: 1; }
.nickname {
    font-size: 16px;
    font-weight: 600;
    color: #1a1a2e;
}
.tag {
    font-size: 12px;
    color: #fe2c55;
    font-weight: 500;
}
.cover {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 12px;
    aspect-ratio: 16/9;
    object-fit: cover;
    background: #f0f0f0;
}
.title {
    font-size: 15px;
    color: #333;
    line-height: 1.5;
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
.stats {
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
}
.stat-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    color: #666;
}
.stat-item .icon { font-size: 14px; }
.url {
    font-size: 12px;
    color: #999;
    word-break: break-all;
}
.badge {
    display: inline-block;
    background: #fe2c55;
    color: #fff;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 8px;
}
</style>
</head>
<body>
<div class="card">
    <div class="header">
        <img class="avatar" src="$avatar" alt="avatar" onerror="this.style.display='none'">
        <div class="header-info">
            <div class="nickname">$nickname</div>
            <div class="tag">📹 新视频发布 <span class="badge">抖音</span></div>
        </div>
    </div>
    <img class="cover" src="$cover" alt="cover" onerror="this.style.display='none'">
    <div class="title">$title</div>
    <div class="stats">
        <span class="stat-item"><span class="icon">❤️</span> $digg_count</span>
        <span class="stat-item"><span class="icon">💬</span> $comment_count</span>
        <span class="stat-item"><span class="icon">⭐</span> $collect_count</span>
        <span class="stat-item"><span class="icon">🔗</span> $share_count</span>
    </div>
    <div class="url">$url</div>
</div>
</body>
</html>
